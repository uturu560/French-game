<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>French & English Matching Game</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5818700278216143" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <h1 id="page-title">Match the Words!</h1>
      <a href="about.html" class="btn btn-mode" id="faq-link">FAQ</a>
      <a href="privacy.html" class="btn btn-mode add-to-chrome-btn">Privacy</a>
      <a href="https://chromewebstore.google.com/detail/dmmlkmlpfnjhclheapjllopnfknjkdfm" target="_blank" rel="noopener noreferrer" class="btn btn-mode add-to-chrome-btn" id="add-to-chrome-link">Add to Chrome</a>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" id="lang-en" class="btn btn-lang active" data-lang="en">English</button>
        <button type="button" id="lang-fr" class="btn btn-lang" data-lang="fr">Français</button>
      </div>
    </div>
    <p class="instruction" id="instruction">Click two cards to find matching pairs — French and English.</p>
    <button type="button" id="options-toggle" class="options-toggle" aria-label="Open options" aria-expanded="false">Options</button>
  </header>

  <main class="main">
    <div id="options-overlay" class="options-overlay" aria-hidden="true"></div>
    <div class="main-inner">
      <aside class="options-panel" id="options-panel">
        <div class="options-panel-header">
          <h2 class="options-title" id="options-title">OPTIONS</h2>
          <button type="button" id="options-close" class="options-close" aria-label="Close options">×</button>
        </div>
        <div class="theme-option" role="group" aria-label="Theme">
          <button type="button" id="dark-mode-toggle" class="btn btn-mode btn-theme-toggle" aria-pressed="false">Dark mode</button>
        </div>
        <div class="controls">
          <label for="set-select" id="set-label">Choose a set:</label>
          <select id="set-select" aria-label="Choose word set">
            <option value="">Loading...</option>
          </select>
          <label for="level-select" id="level-label">Level:</label>
          <div class="level-row" id="level-select-row">
            <select id="level-select" aria-label="Level">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
            <button type="button" id="next-btn" class="btn btn-primary">Next</button>
          </div>
          <div id="practice-level-strip" class="practice-level-strip hidden" role="group" aria-label="Level"></div>
        </div>
        <div class="game-hud">
          <div class="hud-stat hud-title" id="title-display-wrap"><span id="title-display" aria-label="Your rank">Bronze Learner 🥉</span></div>
          <div class="progress-section">
            <div class="progress-label"><span id="progress-text">Level 1/10 · 0/6 pairs</span></div>
            <div class="progress-bar-wrap">
              <div class="progress-bar level-progress-bar" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="10" aria-label="Level progress">
                <div class="progress-bar-fill level-progress-fill" id="level-progress-fill"></div>
              </div>
            </div>
            <div id="pairs-progress-bar" class="progress-bar pairs-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="6" aria-label="Pairs matched">
              <div class="progress-bar-fill pairs-progress-fill" id="progress-bar-fill"></div>
            </div>
          </div>
          <div class="hud-stat hud-time"><span class="hud-stat-label" id="time-label">TIME:</span> <span id="timer-text">0:00</span></div>
          <div class="hud-stat hud-score"><span class="hud-stat-label" id="score-label">SCORE:</span> <span id="score-value">0</span></div>
        </div>
      </aside>
      <div class="game-board-wrap">
        <div id="game-area" class="game-area" aria-live="polite"></div>
      </div>
    </div>

    <div id="win-message" class="win-message hidden" role="alert">
      <p id="win-text">You did it! Great job!</p>
      <div class="win-stats">
        <div id="win-stars" class="win-stars" role="img" aria-label="Stars"></div>
        <p id="win-score-line">Score: <strong id="win-score-value">0</strong></p>
        <p id="win-time-line">Time: <strong id="win-time-value">0:00</strong></p>
      </div>
      <div class="win-actions">
        <button type="button" id="win-replay-btn" class="btn btn-primary">Replay</button>
        <button type="button" id="win-next-btn" class="btn btn-primary">Next</button>
        <button type="button" id="win-back-btn" class="btn btn-secondary">Back to start</button>
      </div>
    </div>

    <div id="timeup-message" class="win-message timeup-message hidden" role="alert">
      <p id="timeup-text">Time's up!</p>
      <p class="timeup-hint">Try again and match all pairs before the timer runs out!</p>
      <div class="win-actions">
        <button type="button" id="timeup-retry-btn" class="btn btn-primary">Retry</button>
        <button type="button" id="timeup-back-btn" class="btn btn-secondary">Back to start</button>
      </div>
    </div>

  </main>

  <script src="game.js"></script>
</body>
</html>
